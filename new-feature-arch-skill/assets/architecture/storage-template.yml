storage:
  id: <идентификатор-хранилища>
  name: <название-хранилища>
  type: <postgresql|mongodb|redis|kafka-topic|...>
  owner: <владелец>
  description: <описание>

schemas:
  - name: <название-схемы>
    tables:
      - name: <название-таблицы>
        description: <описание>
        columns:
          - name: <название-колонки>
            type: <тип-колонки>
            nullable: false
            description: <описание>
        primaryKey:
          - <название-колонки>
        indexes:
          - name: <название-индекса>
            columns:
              - <название-колонки>
